<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Solicitar Permiso - SCHAP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- estilos generales -->
    <link rel="stylesheet" href="css/layout.css?v=9">
    <link rel="stylesheet" href="css/permiso.css?v=9">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div id="app-header"></div>

    <main class="perm-main">
        <section class="card">
            <h2>Días solicitados</h2>

            <table class="perm-table">
                <thead>
                    <tr>
                        <th>Día</th>
                        <th>Desde</th>
                        <th>Hasta</th>
                        <th>Día completo</th>
                        <th>comentarios</th>
                        <th style="width: 40px;"></th>
                    </tr>
                </thead>
                <tbody id="perm-body">
                    <!-- filas dinámicas -->
                </tbody>
                <tfoot>
                    <tr>
                        <td colspan="6" class="tfoot-center">
                            <button id="btn-add-row" class="btn btn-success">
                                <i class="fa fa-plus-circle"></i> Agregar fila
                            </button>
                        </td>
                    </tr>
                </tfoot>
            </table>

            <div class="perm-actions">
                <button id="btn-save" class="btn btn-primary">
                    <i class="fa fa-save"></i> Guardar
                </button>
                <button id="btn-cancel" class="btn btn-danger">
                    <i class="fa fa-times"></i> Cancelar
                </button>
            </div>

            <p id="perm-msg" class="perm-msg"></p>
        </section>
    </main>

    <footer>
        <span id="footer-user">Usuario: -</span>
        <span class="muted">© SCHAP SCHAP</span>
    </footer>

    <script src="js/api.js?v=9"></script>
  <script src="js/layout.js?v=9"></script>
    <script src="js/permiso.js?v=9"></script>

</body>

</html>
