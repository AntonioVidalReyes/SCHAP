<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Reportes - SCHAP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/layout.css?v=9">
    <link rel="stylesheet" href="css/reportes.css?v=9">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div id="app-header"></div>

    <main class="rep-main">
        <h1 class="rep-title">Reportes</h1>

        <!-- SECCIÓN USUARIO -->
        <section class="rep-section">
            <div class="rep-section-header">Usuario</div>
            <div class="rep-section-body">

                <!-- TOOLBAR -->
                <div class="rep-toolbar">
                    <div class="rep-search">
                        <i class="fa fa-search"></i>
                        <input type="text" id="search-usuarios" placeholder="Buscar...">
                    </div>
                    <div class="rep-toolbar-right">
                        <select id="limit-usuarios" class="rep-select">
                            <option value="10">10</option>
                            <option value="25">25</option>
                            <option value="50">50</option>
                        </select>
                    </div>
                </div>

                <!-- TABLA USUARIOS -->
                <table class="rep-table">
                    <thead>
                        <tr>
                            <th style="width:40px;"></th>
                            <th class="sortable" data-col="id"># <i class="fa fa-sort"></i></th>
                            <th class="sortable" data-col="name">Nombre <i class="fa fa-sort"></i></th>
                            <th>Correo Electrónico</th>
                            <th>Rol</th>
                            <th>Horas</th>
                            <th>Solicitudes Pendientes</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-usuarios">
                        <!-- Filas dinámicas -->
                    </tbody>
                </table>

                <!-- PAGINACIÓN -->
                <div class="rep-footer">
                    <div class="rep-pagination" id="pagination-usuarios">
                    </div>
                    <div class="rep-info" id="info-usuarios">
                        Mostrando 0 al 0 de 0 resultados
                    </div>
                </div>
            </div>
        </section>

        <!-- SECCIÓN USUARIO SELECCIONADO -->
        <section class="rep-section">
            <div class="rep-section-header">Usuario seleccionado</div>
            <div class="rep-section-body">
                <table class="rep-table rep-table--selected">
                    <thead>
                        <tr>
                            <th>Nombre completo</th>
                            <th>Correo electrónico</th>
                            <th>Rol</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td id="selected-nombre">-</td>
                            <td id="selected-email">-</td>
                            <td id="selected-rol">-</td>
                        </tr>
                    </tbody>
                </table>

                <!-- FECHAS -->
                <div class="rep-fechas">
                    <div class="rep-fecha-group">
                        <label>Desde</label>
                        <input type="date" id="fecha-desde">
                    </div>
                    <div class="rep-fecha-group">
                        <label>Hasta</label>
                        <input type="date" id="fecha-hasta">
                    </div>
                </div>

                <!-- BOTÓN GENERAR -->
                <div class="rep-btn-container">
                    <button class="btn-generar" id="btn-generar" disabled>
                        Generar reporte
                    </button>
                </div>
            </div>
        </section>

    </main>

    <footer>
        <span id="footer-user">Usuario: -</span>
        <span class="muted">© SCHAP SCHAP</span>
    </footer>

    <script src="js/api.js?v=9"></script>
  <script src="js/layout.js?v=9"></script>
    <script src="js/reportes.js?v=9"></script>

</body>

</html>
