<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Solicitar - SCHAP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/layout.css?v=9">
    <link rel="stylesheet" href="css/solicitar.css?v=9">

<body>

    <div id="app-header"></div>

    <main class="sol-main">
        <div class="sol-grid">

            <div class="sol-card" id="card-notificacion">
                <div class="sol-icon">
                    <i class="fa fa-bell"></i>
                </div>
                <div class="sol-title">Notificación</div>
            </div>

            <div class="sol-card" id="card-permiso">
                <div class="sol-icon">
                    <i class="fa fa-gift"></i>
                </div>
                <div class="sol-title">Permiso</div>
            </div>

            <div class="sol-card" id="card-rendicion">
                <div class="sol-icon">
                    <i class="fa fa-eye"></i>
                </div>
                <div class="sol-title">Rendición</div>
            </div>

        </div>
    </main>

    <footer>
        <span id="footer-user">Usuario: -</span>
        <span class="muted">© SCHAP SCHAP</span>
    </footer>

    <script src="js/api.js?v=9"></script>
  <script src="js/layout.js?v=9"></script>
    <script src="js/solicitar.js?v=9"></script>
