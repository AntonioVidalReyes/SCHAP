<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Solicitudes - SCHAP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/layout.css?v=9">
    <link rel="stylesheet" href="css/solicitudes.css?v=9">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div id="app-header"></div>

    <main class="sol-main">
        <div class="sol-grid">

            <div class="sol-card" id="card-mias">
                <div class="sol-icon">
                    <i class="fa-solid fa-file"></i>
                </div>
                <div class="sol-title">Ver mis solicitudes</div>
            </div>

            <div class="sol-card" id="card-pendientes">
                <div class="sol-icon">
                    <i class="fa-solid fa-file-circle-exclamation"></i>
                </div>
                <div class="sol-title">Ver solicitudes pendientes</div>
            </div>

            <div class="sol-card" id="card-revisadas">
                <div class="sol-icon">
                    <i class="fa-solid fa-file-circle-check"></i>
                </div>
                <div class="sol-title">Ver solicitudes revisadas</div>
            </div>

        </div>
    </main>

    <footer>
        <span id="footer-user">Usuario: -</span>
        <span class="muted">© SCHAP SCHAP</span>
    </footer>

    <script src="js/api.js?v=9"></script>
  <script src="js/layout.js?v=9"></script>
    <script src="js/solicitudes.js?v=9"></script>
</body>

</html>
