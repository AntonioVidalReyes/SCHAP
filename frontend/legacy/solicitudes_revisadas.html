<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Solicitudes Revisadas - SCHAP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/layout.css?v=9">
    <link rel="stylesheet" href="css/solicitudes_revisadas.css?v=9">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div id="app-header"></div>

    <main class="rev-main">

        <!-- LEYENDA -->
        <div class="rev-legend">
            <div class="sol-legend-test">
                <span class="legend-text">Leyenda</span>
            </div>
            <div class="rev-legend-item">
                <span class="rev-legend-color legend-permiso"></span>
                <span>Permiso</span>
            </div>
            <div class="rev-legend-item">
                <span class="rev-legend-color legend-rendicion"></span>
                <span>Rendición</span>
            </div>
            <div class="rev-legend-item">
                <span class="rev-legend-color legend-notificacion"></span>
                <span>Notificación</span>
            </div>
            <div class="rev-legend-item">
                <span class="rev-legend-color legend-abono"></span>
                <span>Abono</span>
            </div>
        </div>

        <!-- SECCIÓN SOLICITUDES REVISADAS -->
        <section class="rev-section">
            <h2 class="rev-section-title">Solicitudes Revisadas</h2>

            <div class="rev-toolbar">
                <div class="rev-search">
                    <i class="fa fa-search"></i>
                    <input type="text" id="search-revisadas" placeholder="Buscar...">
                </div>
                <div class="rev-toolbar-right">
                    <select id="filter-tipo" class="rev-select">
                        <option value="">Todos los tipos</option>
                        <option value="Permiso">Permiso</option>
                        <option value="Rendición">Rendición</option>
                        <option value="Notificación">Notificación</option>
                    </select>
                    <select id="filter-estado" class="rev-select">
                        <option value="">Todos los estados</option>
                        <option value="aprobada">Aprobada</option>
                        <option value="rechazada">Rechazada</option>
                    </select>
                    <select id="limit-revisadas" class="rev-select">
                        <option value="10">10</option>
                        <option value="25">25</option>
                        <option value="50">50</option>
                    </select>
                </div>
            </div>

            <table class="rev-table">
                <thead>
                    <tr>
                        <th class="sortable" data-col="id"># <i class="fa fa-sort"></i></th>
                        <th class="sortable" data-col="created_at">Enviado el <i class="fa fa-sort"></i></th>
                        <th>Tipo</th>
                        <th>Cliente</th>
                        <th>Proyecto</th>
                        <th>Estado</th>
                        <th class="sortable" data-col="user_name">Enviado por <i class="fa fa-sort"></i></th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tbody-revisadas">
                    <!-- Filas dinámicas -->
                </tbody>
            </table>

            <div class="rev-footer">
                <div class="rev-pagination" id="pagination-revisadas">
                    <!-- Paginación dinámica -->
                </div>
                <div class="rev-info" id="info-revisadas">
                    Mostrando 0 al 0 de 0 resultados
                </div>
            </div>
        </section>

    </main>

    <footer>
        <span id="footer-user">Usuario: -</span>
        <span class="muted">© SCHAP SCHAP</span>
    </footer>

    <script src="js/api.js?v=9"></script>
  <script src="js/layout.js?v=9"></script>
    <script src="js/solicitudes_revisadas.js?v=9"></script>

</body>

</html>
