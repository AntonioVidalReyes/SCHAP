<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Solicitudes Mias - SCHAP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/layout.css?v=9">
    <link rel="stylesheet" href="css/solicitudes_mias.css?v=9">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div id="app-header"></div>

    <main class="sol-main">

        <!-- LEYENDA -->
        <div class="sol-legend">
            <div class="sol-legend-test">
                <span class="legend-text">Leyenda</span>
            </div>
            <div class="sol-legend-item">
                <span class="sol-legend-color legend-permiso"></span>
                <span>Permiso</span>
            </div>
            <div class="sol-legend-item">
                <span class="sol-legend-color legend-rendicion"></span>
                <span>Rendición</span>
            </div>
            <div class="sol-legend-item">
                <span class="sol-legend-color legend-notificacion"></span>
                <span>Notificación</span>
            </div>
            <div class="sol-legend-item">
                <span class="sol-legend-color legend-abono"></span>
                <span>Abono</span>
            </div>
        </div>

        <!-- SECCIÓN PENDIENTES -->
        <section class="sol-section">
            <h2 class="sol-section-title">Pendientes</h2>

            <div class="sol-toolbar">
                <div class="sol-search">
                    <i class="fa fa-search"></i>
                    <input type="text" id="search-pendientes" placeholder="Buscar...">
                </div>
                <div class="sol-toolbar-right">
                    <select id="limit-pendientes" class="sol-select">
                        <option value="10">10</option>
                        <option value="25">25</option>
                        <option value="50">50</option>
                    </select>
                </div>
            </div>

            <table class="sol-table">
                <thead>
                    <tr>
                        <th class="sortable" data-col="id"># <i class="fa fa-sort"></i></th>
                        <th class="sortable" data-col="created_at">Enviado el <i class="fa fa-sort"></i></th>
                        <th>Tipo</th>
                        <th>Cliente</th>
                        <th>Trabajo</th>
                        <th>Estado</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tbody-pendientes">
                    <!-- Filas dinámicas -->
                </tbody>
            </table>

            <div class="sol-footer">
                <div class="sol-pagination" id="pagination-pendientes">
                    <!-- Paginación dinámica -->
                </div>
                <div class="sol-info" id="info-pendientes">
                    Mostrando 0 al 0 de 0 resultados
                </div>
            </div>
        </section>

        <!-- SECCIÓN HISTORIAL -->
        <section class="sol-section">
            <h2 class="sol-section-title">Historial</h2>

            <div class="sol-toolbar">
                <div class="sol-search">
                    <i class="fa fa-search"></i>
                    <input type="text" id="search-historial" placeholder="Buscar...">
                </div>
                <div class="sol-toolbar-right">
                    <select id="limit-historial" class="sol-select">
                        <option value="10">10</option>
                        <option value="25">25</option>
                        <option value="50">50</option>
                    </select>
                </div>
            </div>

            <table class="sol-table">
                <thead>
                    <tr>
                        <th class="sortable" data-col="id"># <i class="fa fa-sort"></i></th>
                        <th class="sortable" data-col="created_at">Enviado el <i class="fa fa-sort"></i></th>
                        <th>Tipo</th>
                        <th>Cliente</th>
                        <th>Trabajo</th>
                        <th>Estado</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tbody-historial">
                    <!-- Filas dinámicas -->
                </tbody>
            </table>

            <div class="sol-footer">
                <div class="sol-pagination" id="pagination-historial">
                    <!-- Paginación dinámica -->
                </div>
                <div class="sol-info" id="info-historial">
                    Mostrando 0 al 0 de 0 resultados
                </div>
            </div>
        </section>

    </main>

    <footer>
        <span id="footer-user">Usuario: -</span>
        <span class="muted">© SCHAP SCHAP</span>
    </footer>

    <script src="js/api.js?v=9"></script>
  <script src="js/layout.js?v=9"></script>
    <script src="js/solicitudes_mias.js?v=9"></script>

</body>

</html>
