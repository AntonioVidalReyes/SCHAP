version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: scha_postgres_db
    environment:
      POSTGRES_DB: ${DB_NAME:-cho_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cho_secure_password_2025}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: scha_backend_api
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - db
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: scha_frontend_web
    ports:
      - "8282:80"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
